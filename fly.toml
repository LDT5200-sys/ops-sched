# Fly.io 部署配置
app = "ldt5200-ops-sched"
primary_region = "nrt"

[env]
  STREAMLIT_SERVER_PORT = "8080"
  STREAMLIT_SERVER_ADDRESS = "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_SERVER_ENABLE_CORS = "false"
  STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION = "false"

[mounts]
  source = "ops_sched_data"
  destination = "/app/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
